<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Caça Palavras</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #b2c9c3;
    --surface: #f4efe6;
    --text: #1a1a1a;
    --text2: #555;
    --accent: #d97757;
    --found: #5a8a6a;
    --found-bg: rgba(90, 138, 106, 0.15);
    --select-color: #d97757;
    --select-bg: rgba(217, 119, 87, 0.15);
    --radius: 12px;
    --border: rgba(0,0,0,0.07);
  }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #b2c9c3;
    color: #1a1a1a;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; }

  /* ===== HEADER ===== */
  .header {
    background: rgba(244, 239, 230, 0.9);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 16px 20px;
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: space-between;
    justify-content: space-between;
    border-bottom: 1px solid rgba(0,0,0,0.07);
    position: -webkit-sticky;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: -0.5px;
    font-family: Georgia, 'Times New Roman', serif;
  }
  .header-subtitle {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555;
    margin-top: 2px;
  }
  .header-right { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; }

  /* ===== BUTTONS ===== */
  .btn {
    background: #f4efe6;
    border: 1px solid rgba(0,0,0,0.15);
    color: #1a1a1a;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.8rem;
    font-family: 'Courier New', Courier, monospace;
    cursor: pointer;
    transition: all 0.2s;
    min-height: 40px;
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    white-space: nowrap;
  }
  .btn > * + * { margin-left: 6px; }
  .btn:hover, .btn:active { background: rgba(244, 239, 230, 0.7); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.primary:hover, .btn.primary:active { background: #c86844; }
  .btn.success {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.success:hover, .btn.success:active { background: #c86844; }
  .btn.music-on {
    background: #f4efe6;
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 8px;
  }
  .btn.music-off {
    background: #f4efe6;
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 8px;
  }
  .btn-icon { font-size: 1.1rem; }

  /* ===== LEVEL SELECT SCREEN ===== */
  #screen-select { background: #b2c9c3; }
  .select-content { -webkit-flex: 1; flex: 1; padding: 24px 16px; overflow-y: auto; }
  .progress-bar-wrap {
    background: rgba(0,0,0,0.1);
    border-radius: 50px;
    height: 8px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 50px;
    transition: width 0.5s ease;
  }
  .progress-text {
    text-align: center;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.75rem;
    color: #555;
    margin-bottom: 20px;
  }

  .group-label {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555;
    margin: 20px 0 10px 4px;
  }
  .levels-grid {
    display: -webkit-flex;
    display: flex;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
    margin: -5px;
  }
  .level-btn { margin: 5px; }
  .level-btn { width: calc(20% - 10px); }

  .level-btn {
    padding-bottom: 0;
    background: #f4efe6;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 10px;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    min-height: 64px;
    height: 64px;
  }
  .level-btn:hover, .level-btn:active {
    transform: scale(0.95);
  }
  .level-btn.locked {
    opacity: 0.45;
    cursor: default;
    pointer-events: none;
  }
  .level-btn.completed {
    background: rgba(90, 138, 106, 0.12);
    border-color: var(--found);
  }
  .level-btn.current {
    border-color: var(--accent);
  }
  .level-num {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: #1a1a1a;
  }
  .level-check {
    position: absolute;
    top: 4px;
    right: 6px;
    font-size: 0.8rem;
    color: var(--found);
  }
  .level-stars {
    display: -webkit-flex;
    display: flex;
    -webkit-justify-content: center;
    justify-content: center;
    -webkit-align-items: center;
    align-items: center;
    margin-top: 2px;
    color: var(--accent);
  }
  .level-stars > * + * { margin-left: 2px; }
  .level-theme {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.5rem;
    color: #555;
    margin-top: 2px;
    text-align: center;
    line-height: 1.2;
  }

  /* ===== GAME SCREEN ===== */
  #screen-game { background: #b2c9c3; }
  .game-content { -webkit-flex: 1; flex: 1; padding: 12px; display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; -webkit-align-items: center; align-items: center; overflow-y: auto; }

  .level-info {
    text-align: center;
    margin-bottom: 10px;
    width: 100%;
  }
  .level-info .level-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
  }
  .level-info .level-desc {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555;
    margin-top: 2px;
  }

  .game-layout {
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-align-items: center;
    align-items: center;
    width: 100%;
    max-width: 700px;
  }
  .game-layout > * + * { margin-top: 14px; }

  /* ===== GRID ===== */
  .grid-wrapper {
    position: relative;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .word-grid {
    display: -webkit-flex;
    display: flex;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
    background: rgba(178, 201, 195, 0.5);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: var(--radius);
    padding: 4px;
  }
  .cell { margin: 1px; -webkit-flex-shrink: 0; flex-shrink: 0; }
  .cell {
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1rem;
    font-family: Georgia, 'Times New Roman', serif;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    color: #1a1a1a;
    background: #f4efe6;
    border: 1px solid rgba(0,0,0,0.08);
    position: relative;
  }
  .cell.selecting {
    background: var(--select-bg);
    color: var(--select-color);
  }
  .cell.found {
    background: var(--found-bg);
    color: var(--found);
  }
  .cell.found.selecting {
    background: rgba(217, 119, 87, 0.2);
    color: var(--accent);
  }

  /* ===== WORD LIST ===== */
  .word-list-wrap {
    width: 100%;
    background: #f4efe6;
    border-radius: 12px;
    padding: 12px 14px;
    border: 1px solid rgba(0,0,0,0.07);
  }
  .word-list-title {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555;
    margin-bottom: 10px;
  }
  .word-list {
    display: -webkit-flex;
    display: flex;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
    margin: -4px;
  }
  .word-chip { margin: 4px; }
  .word-chip {
    background: rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 20px;
    padding: 5px 12px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.8rem;
    color: #1a1a1a;
    transition: all 0.3s;
    text-transform: uppercase;
  }
  .word-chip.found-word {
    background: var(--found-bg);
    border-color: var(--found);
    color: var(--found);
    text-decoration: line-through;
    opacity: 0.7;
  }

  .words-count {
    margin-top: 10px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.75rem;
    color: #555;
    text-align: right;
  }

  /* ===== CELEBRATION ===== */
  .celebration-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: center;
    justify-content: center;
    -webkit-flex-direction: column;
    flex-direction: column;
  }
  .celebration-overlay.show { display: -webkit-flex; display: flex; }
  .celebration-box {
    background: #f4efe6;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 16px;
    padding: 36px 32px;
    text-align: center;
    max-width: 380px;
    width: 90%;
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .celebration-emoji { font-size: 4rem; margin-bottom: 12px; display: block; color: var(--accent); }
  .celebration-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 8px;
  }
  .celebration-sub {
    font-family: 'Courier New', Courier, monospace;
    color: #555;
    font-size: 0.85rem;
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .celebration-stars { font-size: 2rem; margin-bottom: 20px; color: var(--accent); }
  .celebration-btns { display: -webkit-flex; display: flex; -webkit-justify-content: center; justify-content: center; -webkit-flex-wrap: wrap; flex-wrap: wrap; }
  .celebration-btns > * + * { margin-left: 12px; }

  /* ===== CONFETTI ===== */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 300;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ===== HIGHLIGHT OVERLAY ===== */
  .found-line {
    position: absolute;
    background: rgba(90, 138, 106, 0.3);
    border-radius: 50px;
    pointer-events: none;
    z-index: 10;
    transition: all 0.3s;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 480px) {
    .levels-grid { }
    .level-btn { min-height: 54px; }
    .level-num { font-size: 1rem; }
    .cell { font-size: 0.85rem; }
  }
  @media (min-width: 600px) {
    .game-layout { -webkit-flex-direction: row; flex-direction: row; -webkit-align-items: flex-start; align-items: flex-start; }
    .word-list-wrap { width: 200px; -webkit-flex-shrink: 0; flex-shrink: 0; }
    .word-list { -webkit-flex-direction: column; flex-direction: column; }
  }

  /* ===== TIMER & SCORE ===== */
  .game-stats {
    display: -webkit-flex;
    display: flex;
    -webkit-justify-content: center;
    justify-content: center;
    margin-bottom: 8px;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
  }
  .game-stats > * + * { margin-left: 14px; }
  .stat-chip {
    background: rgba(0,0,0,0.05);
    border-radius: 20px;
    padding: 4px 14px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.75rem;
    color: #555;
  }
  .stat-chip span { color: #1a1a1a; font-weight: 700; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1a1a1a;
    color: #f4efe6;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.85rem;
    padding: 10px 24px;
    border-radius: 50px;
    z-index: 500;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
    white-space: nowrap;
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
  }
  #toast > * + * { margin-left: 6px; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.wrong { background: #1a1a1a; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

  .level-check svg, .level-stars svg { display: inline-block; vertical-align: middle; }
</style>

</head>
<body>

<!-- LEVEL SELECT SCREEN -->
<div id="screen-select" class="screen active">
  <div class="header">
    <div>
      <h1>Caça Palavras</h1>
      <div class="header-subtitle">40 níveis de diversão</div>
    </div>
    <div class="header-right">
      <button class="btn music-on" id="music-btn-select" onclick="toggleMusic()"></button>
    </div>
  </div>
  <div class="select-content">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progress-text">0 de 40 níveis completos</div>
    <div id="levels-container"></div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="screen-game" class="screen">
  <div class="header">
    <div>
      <button class="btn" onclick="goToSelect()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 256 256" fill="currentColor"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"/></svg> Níveis</button>
    </div>
    <div id="game-header-title" style="font-weight:700; font-size:1rem;"></div>
    <div class="header-right">
      <button class="btn music-on" id="music-btn-game" onclick="toggleMusic()"></button>
    </div>
  </div>
  <div class="game-content">
    <div class="level-info">
      <div class="level-title" id="level-title"></div>
      <div class="level-desc" id="level-desc"></div>
    </div>
    <div class="game-stats">
      <div class="stat-chip">Encontradas: <span id="stat-found">0</span>/<span id="stat-total">0</span></div>
      <div class="stat-chip">Tempo: <span id="stat-time">0:00</span></div>
    </div>
    <div class="game-layout">
      <div>
        <div class="grid-wrapper" id="grid-wrapper">
          <div class="word-grid" id="word-grid"></div>
        </div>
      </div>
      <div class="word-list-wrap">
        <div class="word-list-title">Palavras para encontrar</div>
        <div class="word-list" id="word-list"></div>
        <div class="words-count" id="words-count"></div>
      </div>
    </div>
  </div>
</div>

<!-- CELEBRATION OVERLAY -->
<div class="celebration-overlay" id="celebration">
  <div class="celebration-box">
    <span class="celebration-emoji" id="cel-emoji"></span>
    <div class="celebration-title" id="cel-title">Parabéns!</div>
    <div class="celebration-stars" id="cel-stars"></div>
    <div class="celebration-sub" id="cel-sub">Você encontrou todas as palavras!</div>
    <div class="celebration-btns">
      <button class="btn" onclick="goToSelect()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 256 256" fill="currentColor"><path d="M224,128a8,8,0,0,1-8,8H40a8,8,0,0,1,0-16H216A8,8,0,0,1,224,128ZM40,72H216a8,8,0,0,0,0-16H40a8,8,0,0,0,0,16ZM216,184H40a8,8,0,0,0,0,16H216a8,8,0,0,0,0-16Z"/></svg> Níveis</button>
      <button class="btn success" id="next-level-btn" onclick="goToNextLevel()">Próximo</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

      g.gain.linearRampToValueAtTime(0, now + 9);
