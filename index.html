<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Caça Palavras</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #b2c9c3;
    --surface: #f4efe6;
    --text: #1a1a1a;
    --text2: #555;
    --accent: #d97757;
    --found: #5a8a6a;
    --found-bg: rgba(90, 138, 106, 0.15);
    --select-color: #d97757;
    --select-bg: rgba(217, 119, 87, 0.15);
    --radius: 12px;
    --border: rgba(0,0,0,0.07);
  }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #b2c9c3;
    color: #1a1a1a;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; }

  /* ===== HEADER ===== */
  .header {
    background: rgba(244, 239, 230, 0.9);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 16px 20px;
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: space-between;
    justify-content: space-between;
    border-bottom: 1px solid rgba(0,0,0,0.07);
    position: -webkit-sticky;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: -0.5px;
    font-family: Georgia, 'Times New Roman', serif;
  }
  .header-subtitle {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555;
    margin-top: 2px;
  }
  .header-right { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; }

  /* ===== BUTTONS ===== */
  .btn {
    background: #f4efe6;
    border: 1px solid rgba(0,0,0,0.15);
    color: #1a1a1a;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.8rem;
    font-family: 'Courier New', Courier, monospace;
    cursor: pointer;
    transition: all 0.2s;
    min-height: 40px;
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    white-space: nowrap;
  }
  .btn > * + * { margin-left: 6px; }
  .btn:hover, .btn:active { background: rgba(244, 239, 230, 0.7); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.primary:hover, .btn.primary:active { background: #c86844; }
  .btn.success {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.success:hover, .btn.success:active { background: #c86844; }
  .btn.music-on {
    background: #f4efe6;
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 8px;
  }
  .btn.music-off {
    background: #f4efe6;
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 8px;
  }
  .btn-icon { font-size: 1.1rem; }

  /* ===== LEVEL SELECT SCREEN ===== */
  #screen-select { background: #b2c9c3; }
  .select-content { -webkit-flex: 1; flex: 1; padding: 24px 16px; overflow-y: auto; }
  .progress-bar-wrap {
    background: rgba(0,0,0,0.1);
    border-radius: 50px;
    height: 8px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 50px;
    transition: width 0.5s ease;
  }
  .progress-text {
    text-align: center;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.75rem;
    color: #555;
    margin-bottom: 20px;
  }

  .group-label {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555;
    margin: 20px 0 10px 4px;
  }
  .levels-grid {
    display: -webkit-flex;
    display: flex;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
    margin: -5px;
  }
  .level-btn { margin: 5px; }
  .level-btn { width: calc(20% - 10px); }

  .level-btn {
    padding-bottom: 0;
    background: #f4efe6;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 10px;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    min-height: 64px;
    height: 64px;
  }
  .level-btn:hover, .level-btn:active {
    transform: scale(0.95);
  }
  .level-btn.locked {
    opacity: 0.45;
    cursor: default;
    pointer-events: none;
  }
  .level-btn.completed {
    background: rgba(90, 138, 106, 0.12);
    border-color: var(--found);
  }
  .level-btn.current {
    border-color: var(--accent);
  }
  .level-num {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: #1a1a1a;
  }
  .level-check {
    position: absolute;
    top: 4px;
    right: 6px;
    font-size: 0.8rem;
    color: var(--found);
  }
  .level-stars {
    display: -webkit-flex;
    display: flex;
    -webkit-justify-content: center;
    justify-content: center;
    -webkit-align-items: center;
    align-items: center;
    margin-top: 2px;
    color: var(--accent);
  }
  .level-stars > * + * { margin-left: 2px; }
  .level-theme {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.5rem;
    color: #555;
    margin-top: 2px;
    text-align: center;
    line-height: 1.2;
  }

  /* ===== GAME SCREEN ===== */
  #screen-game { background: #b2c9c3; }
  .game-content { -webkit-flex: 1; flex: 1; padding: 12px; display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; -webkit-align-items: center; align-items: center; overflow-y: auto; }

  .level-info {
    text-align: center;
    margin-bottom: 10px;
    width: 100%;
  }
  .level-info .level-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
  }
  .level-info .level-desc {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555;
    margin-top: 2px;
  }

  .game-layout {
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-align-items: center;
    align-items: center;
    width: 100%;
    max-width: 700px;
  }
  .game-layout > * + * { margin-top: 14px; }

  /* ===== GRID ===== */
  .grid-wrapper {
    position: relative;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .word-grid {
    display: -webkit-flex;
    display: flex;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
    background: rgba(178, 201, 195, 0.5);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: var(--radius);
    padding: 4px;
  }
  .cell { margin: 1px; -webkit-flex-shrink: 0; flex-shrink: 0; }
  .cell {
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1rem;
    font-family: Georgia, 'Times New Roman', serif;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    color: #1a1a1a;
    background: #f4efe6;
    border: 1px solid rgba(0,0,0,0.08);
    position: relative;
  }
  .cell.selecting {
    background: var(--select-bg);
    color: var(--select-color);
  }
  .cell.found {
    background: var(--found-bg);
    color: var(--found);
  }
  .cell.found.selecting {
    background: rgba(217, 119, 87, 0.2);
    color: var(--accent);
  }

  /* ===== WORD LIST ===== */
  .word-list-wrap {
    width: 100%;
    background: #f4efe6;
    border-radius: 12px;
    padding: 12px 14px;
    border: 1px solid rgba(0,0,0,0.07);
  }
  .word-list-title {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555;
    margin-bottom: 10px;
  }
  .word-list {
    display: -webkit-flex;
    display: flex;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
    margin: -4px;
  }
  .word-chip { margin: 4px; }
  .word-chip {
    background: rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 20px;
    padding: 5px 12px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.8rem;
    color: #1a1a1a;
    transition: all 0.3s;
    text-transform: uppercase;
  }
  .word-chip.found-word {
    background: var(--found-bg);
    border-color: var(--found);
    color: var(--found);
    text-decoration: line-through;
    opacity: 0.7;
  }

  .words-count {
    margin-top: 10px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.75rem;
    color: #555;
    text-align: right;
  }

  /* ===== CELEBRATION ===== */
  .celebration-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: center;
    justify-content: center;
    -webkit-flex-direction: column;
    flex-direction: column;
  }
  .celebration-overlay.show { display: -webkit-flex; display: flex; }
  .celebration-box {
    background: #f4efe6;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 16px;
    padding: 36px 32px;
    text-align: center;
    max-width: 380px;
    width: 90%;
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .celebration-emoji { font-size: 4rem; margin-bottom: 12px; display: block; color: var(--accent); }
  .celebration-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 8px;
  }
  .celebration-sub {
    font-family: 'Courier New', Courier, monospace;
    color: #555;
    font-size: 0.85rem;
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .celebration-stars { font-size: 2rem; margin-bottom: 20px; color: var(--accent); }
  .celebration-btns { display: -webkit-flex; display: flex; -webkit-justify-content: center; justify-content: center; -webkit-flex-wrap: wrap; flex-wrap: wrap; }
  .celebration-btns > * + * { margin-left: 12px; }

  /* ===== CONFETTI ===== */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 300;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ===== HIGHLIGHT OVERLAY ===== */
  .found-line {
    position: absolute;
    background: rgba(90, 138, 106, 0.3);
    border-radius: 50px;
    pointer-events: none;
    z-index: 10;
    transition: all 0.3s;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 480px) {
    .levels-grid { }
    .level-btn { min-height: 54px; }
    .level-num { font-size: 1rem; }
    .cell { font-size: 0.85rem; }
  }
  @media (min-width: 600px) {
    .game-layout { -webkit-flex-direction: row; flex-direction: row; -webkit-align-items: flex-start; align-items: flex-start; }
    .word-list-wrap { width: 200px; -webkit-flex-shrink: 0; flex-shrink: 0; }
    .word-list { -webkit-flex-direction: column; flex-direction: column; }
  }

  /* ===== TIMER & SCORE ===== */
  .game-stats {
    display: -webkit-flex;
    display: flex;
    -webkit-justify-content: center;
    justify-content: center;
    margin-bottom: 8px;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
  }
  .game-stats > * + * { margin-left: 14px; }
  .stat-chip {
    background: rgba(0,0,0,0.05);
    border-radius: 20px;
    padding: 4px 14px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.75rem;
    color: #555;
  }
  .stat-chip span { color: #1a1a1a; font-weight: 700; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1a1a1a;
    color: #f4efe6;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.85rem;
    padding: 10px 24px;
    border-radius: 50px;
    z-index: 500;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
    white-space: nowrap;
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
  }
  #toast > * + * { margin-left: 6px; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.wrong { background: #1a1a1a; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

  .level-check svg, .level-stars svg { display: inline-block; vertical-align: middle; }
</style>
<script>
// iOS 9 / Safari 9 polyfills
if (!Object.values) {
  Object.values = function(o) { return Object.keys(o).map(function(k){ return o[k]; }); };
}
if (!Object.entries) {
  Object.entries = function(o) { return Object.keys(o).map(function(k){ return [k, o[k]]; }); };
}
</script>
</head>
<body>

<!-- LEVEL SELECT SCREEN -->
<div id="screen-select" class="screen active">
  <div class="header">
    <div>
      <h1>Caça Palavras</h1>
      <div class="header-subtitle">40 níveis de diversão</div>
    </div>
    <div class="header-right">
      <button class="btn music-on" id="music-btn-select" onclick="toggleMusic()"></button>
    </div>
  </div>
  <div class="select-content">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progress-text">0 de 40 níveis completos</div>
    <div id="levels-container"></div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="screen-game" class="screen">
  <div class="header">
    <div>
      <button class="btn" onclick="goToSelect()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 256 256" fill="currentColor"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"/></svg> Níveis</button>
    </div>
    <div id="game-header-title" style="font-weight:700; font-size:1rem;"></div>
    <div class="header-right">
      <button class="btn music-on" id="music-btn-game" onclick="toggleMusic()"></button>
    </div>
  </div>
  <div class="game-content">
    <div class="level-info">
      <div class="level-title" id="level-title"></div>
      <div class="level-desc" id="level-desc"></div>
    </div>
    <div class="game-stats">
      <div class="stat-chip">Encontradas: <span id="stat-found">0</span>/<span id="stat-total">0</span></div>
      <div class="stat-chip">Tempo: <span id="stat-time">0:00</span></div>
    </div>
    <div class="game-layout">
      <div>
        <div class="grid-wrapper" id="grid-wrapper">
          <div class="word-grid" id="word-grid"></div>
        </div>
      </div>
      <div class="word-list-wrap">
        <div class="word-list-title">Palavras para encontrar</div>
        <div class="word-list" id="word-list"></div>
        <div class="words-count" id="words-count"></div>
      </div>
    </div>
  </div>
</div>

<!-- CELEBRATION OVERLAY -->
<div class="celebration-overlay" id="celebration">
  <div class="celebration-box">
    <span class="celebration-emoji" id="cel-emoji"></span>
    <div class="celebration-title" id="cel-title">Parabéns!</div>
    <div class="celebration-stars" id="cel-stars"></div>
    <div class="celebration-sub" id="cel-sub">Você encontrou todas as palavras!</div>
    <div class="celebration-btns">
      <button class="btn" onclick="goToSelect()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 256 256" fill="currentColor"><path d="M224,128a8,8,0,0,1-8,8H40a8,8,0,0,1,0-16H216A8,8,0,0,1,224,128ZM40,72H216a8,8,0,0,0,0-16H40a8,8,0,0,0,0,16ZM216,184H40a8,8,0,0,0,0,16H216a8,8,0,0,0,0-16Z"/></svg> Níveis</button>
      <button class="btn success" id="next-level-btn" onclick="goToNextLevel()">Próximo</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

// ===================== AUDIO ENGINE =====================
let audioCtx = null;
let musicNodes = [];
let musicPlaying = false;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function createReverb(ctx, duration) {
  if (duration === undefined) duration = 2.5;
  const convolver = ctx.createConvolver();
  const rate = ctx.sampleRate;
  const len = rate * duration;
  const impulse = ctx.createBuffer(2, len, rate);
  for (let ch = 0; ch < 2; ch++) {
    const d = impulse.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
    }
  }
  convolver.buffer = impulse;
  return convolver;
}

function startMusic() {
  if (musicPlaying) return;
  const ctx = getAudioCtx();
  musicPlaying = true;

  const master = ctx.createGain();
  master.gain.setValueAtTime(0.0, ctx.currentTime);
  master.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 2);
  master.connect(ctx.destination);

  const reverb = createReverb(ctx, 3);
  reverb.connect(master);

  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(900, ctx.currentTime);
  filter.Q.setValueAtTime(0.7, ctx.currentTime);
  filter.connect(reverb);
  filter.connect(master);

  // Chord notes (C major pentatonic)
  const baseNotes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33];

  function playAmbient() {
    if (!musicPlaying) return;
    const now = ctx.currentTime;

    // Pad chord
    [0, 2, 4].forEach((ni, i) => {
      const freq = baseNotes[ni % baseNotes.length];
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = i === 0 ? 'sine' : 'triangle';
      osc.frequency.setValueAtTime(freq + (i * 0.15), now);
      osc.frequency.linearRampToValueAtTime(freq + (i * 0.15) + (Math.random() * 0.5), now + 8);
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.12 / (i + 1), now + 1.5);
      g.gain.linearRampToValueAtTime(0.10 / (i + 1), now + 6);
      g.gain.linearRampToValueAtTime(0, now + 9);
      osc.connect(g);
      g.connect(filter);
      osc.start(now);
      osc.stop(now + 9);
      musicNodes.push(osc, g);
    });

    // Subtle melody note
    const melNote = baseNotes[Math.floor(Math.random() * baseNotes.length)];
    const melOsc = ctx.createOscillator();
    const melG = ctx.createGain();
    melOsc.type = 'sine';
    melOsc.frequency.setValueAtTime(melNote * 2, now + 1);
    melG.gain.setValueAtTime(0, now + 1);
    melG.gain.linearRampToValueAtTime(0.06, now + 2);
    melG.gain.linearRampToValueAtTime(0, now + 5);
    melOsc.connect(melG);
    melG.connect(reverb);
    melOsc.start(now + 1);
    melOsc.stop(now + 6);
    musicNodes.push(melOsc, melG);

    // Low bass pulse
    const bassOsc = ctx.createOscillator();
    const bassG = ctx.createGain();
    bassOsc.type = 'sine';
    bassOsc.frequency.setValueAtTime(baseNotes[0] / 2, now);
    bassG.gain.setValueAtTime(0, now);
    bassG.gain.linearRampToValueAtTime(0.15, now + 0.5);
    bassG.gain.linearRampToValueAtTime(0.08, now + 4);
    bassG.gain.linearRampToValueAtTime(0, now + 8);
    bassOsc.connect(bassG);
    bassG.connect(master);
    bassOsc.start(now);
    bassOsc.stop(now + 9);
    musicNodes.push(bassOsc, bassG);

    setTimeout(() => { if (musicPlaying) playAmbient(); }, 8500);
  }

  playAmbient();
  musicNodes.push(master, reverb, filter);
}

function stopMusic() {
  musicPlaying = false;
  const ctx = audioCtx;
  if (ctx) {
    const now = ctx.currentTime;
    musicNodes.forEach(n => {
      try {
        if (n.gain) n.gain.linearRampToValueAtTime(0, now + 0.5);
        if (n.stop) n.stop(now + 0.6);
      } catch(e) {}
    });
  }
  musicNodes = [];
}

function toggleMusic() {

  localStorage.setItem('cacapalavras_music', state.musicOn ? 'on' : 'off');
  updateMusicButtons();

function playSFX(type) {
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  if (type === 'found') {
    [523.25, 659.25, 783.99].forEach((f, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(f, now + i * 0.08);
      g.gain.setValueAtTime(0.3, now + i * 0.08);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.3);
      o.connect(g); g.connect(ctx.destination);
      o.start(now + i * 0.08); o.stop(now + i * 0.08 + 0.3);
    });
  } else if (type === 'complete') {
    [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(f, now + i * 0.12);
      g.gain.setValueAtTime(0.4, now + i * 0.12);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.5);
      o.connect(g); g.connect(ctx.destination);
      o.start(now + i * 0.12); o.stop(now + i * 0.12 + 0.6);
    });
  } else if (type === 'wrong') {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(200, now);
    o.frequency.linearRampToValueAtTime(150, now + 0.2);
    g.gain.setValueAtTime(0.2, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    o.connect(g); g.connect(ctx.destination);
    o.start(now); o.stop(now + 0.3);
  }
}

// ===================== WORD SEARCH ENGINE =====================
const DIRECTIONS = {
  'H':   [0, 1],
  'V':   [1, 0],
  'D':   [1, 1],
  'DR2': [1, -1],
  'HR':  [0, -1],
  'VR':  [-1, 0],
  'DR':  [-1, -1],
  'DR3': [-1, 1],
};

function buildGrid(size, words, dirKeys) {
  const grid = Array.from({length: size}, () => Array(size).fill(''));
  const placed = [];

  function tryPlace(word, attempts) {
    if (attempts === undefined) attempts = 200;
    for (let a = 0; a < attempts; a++) {
      const dirKey = dirKeys[Math.floor(Math.random() * dirKeys.length)];
      const [dr, dc] = DIRECTIONS[dirKey];
      const maxRow = dr >= 0 ? size - word.length * Math.abs(dr) : size - 1;
      const maxCol = dc >= 0 ? size - word.length * Math.abs(dc) : size - 1;
      const startRow = dr < 0 ? Math.abs(dr) * (word.length - 1) + Math.floor(Math.random() * (size - Math.abs(dr) * (word.length - 1))) : Math.floor(Math.random() * (maxRow + 1));
      const startCol = dc < 0 ? Math.abs(dc) * (word.length - 1) + Math.floor(Math.random() * (size - Math.abs(dc) * (word.length - 1))) : Math.floor(Math.random() * (maxCol + 1));

      if (startRow < 0 || startRow >= size || startCol < 0 || startCol >= size) continue;

      let fits = true;
      const cells = [];
      for (let i = 0; i < word.length; i++) {
        const r = startRow + dr * i;
        const c = startCol + dc * i;
        if (r < 0 || r >= size || c < 0 || c >= size) { fits = false; break; }
        if (grid[r][c] !== '' && grid[r][c] !== word[i]) { fits = false; break; }
        cells.push([r, c]);
      }
      if (fits) {
        cells.forEach(([r, c], i) => { grid[r][c] = word[i]; });
        placed.push({ word, cells, found: false });
        return true;
      }
    }
    return false;
  }

  const failed = [];
  words.forEach(w => { if (!tryPlace(w)) failed.push(w); });

  // Fill empty cells with random letters
  const letters = 'ABCDEFGHIJKLMNOPRSTUVZ';
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (!grid[r][c]) {
        grid[r][c] = letters[Math.floor(Math.random() * letters.length)];
      }
    }
  }

  return { grid, placed, failed };
}

// ===================== UI HELPERS =====================
function showScreen(id) {
  Array.prototype.forEach.call(document.querySelectorAll('.screen'), function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function showToast(msg, type, duration) {
  if (type === undefined) type = 'found';
  if (duration === undefined) duration = 1800;
  const t = document.getElementById('toast');
  t.innerHTML = msg;
  t.className = 'toast ' + (type === 'wrong' ? 'wrong' : 'show');
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), duration);
}

// ===================== LEVEL SELECT =====================
function renderLevelSelect() {
  const container = document.getElementById('levels-container');
  container.innerHTML = '';

  const completed = Object.values(state.progress).filter(v => v && v.completed).length;
  document.getElementById('progress-fill').style.width = (completed / 40 * 100) + '%';
  document.getElementById('progress-text').textContent = `${completed} de 40 níveis completos`;

  LEVEL_GROUPS.forEach(group => {
    const label = document.createElement('div');
    label.className = 'group-label';
    label.textContent = group.name;
    container.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'levels-grid';

    group.levels.forEach(lvl => {
      const prog = state.progress[lvl] || {};
      const isCompleted = prog.completed;
      const isUnlocked = lvl === 1 || (state.progress[lvl - 1] && state.progress[lvl - 1].completed);
      const isCurrent = !isCompleted && isUnlocked;

      const btn = document.createElement('div');
      btn.className = 'level-btn' + (isCompleted ? ' completed' : isCurrent ? ' current' : !isUnlocked ? ' locked' : '');

      const stars = isCompleted ? (prog.stars || 3) : 0;
      btn.innerHTML = `
        ${isCompleted ? `<span class="level-check" style="color:var(--found)">${IC.check}</span>` : ''}
        <span class="level-num">${lvl}</span>
        ${isCompleted ? `<span class="level-stars">${IC.star.repeat(stars)}</span>` : ''}
        <span class="level-theme">${GROUP_THEMES[lvl]}</span>
      `;

      if (!isUnlocked) {
        btn.title = 'Complete o nível anterior primeiro';
      } else {
        btn.addEventListener('click', () => startLevel(lvl));
        btn.addEventListener('touchend', (e) => { e.preventDefault(); startLevel(lvl); });
      }

      grid.appendChild(btn);
    });

    container.appendChild(grid);
  });
}

// ===================== LEVEL START =====================
function startLevel(lvl) {
  state.currentLevel = lvl;
  const cfg = LEVEL_CONFIG[lvl];
  const pool = WORD_POOLS[lvl] || ['PALAVRA', 'JOGO', 'TEXTO'];

  // Pick words from pool
  const wordCount = Math.min(cfg.words, pool.length);
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  const words = shuffled.slice(0, wordCount);

  // Build the grid
  const { grid, placed, failed } = buildGrid(cfg.size, words, cfg.dirs);

  state.grid = grid;
  state.size = cfg.size;
  state.placedWords = placed;
  state.words = placed.map(p => p.word);
  state.foundWords = [];
  state.selecting = false;
  state.startCell = null;
  state.endCell = null;
  state.selectedCells = [];
  state.timerStart = Date.now();
  state.elapsedSeconds = 0;

  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(updateTimer, 1000);

  renderGame();
  showScreen('screen-game');

  if (state.musicOn && !musicPlaying) startMusic();
}

function updateTimer() {
  state.elapsedSeconds = Math.floor((Date.now() - state.timerStart) / 1000);
  const m = Math.floor(state.elapsedSeconds / 60);
  const s = state.elapsedSeconds % 60;
  const el = document.getElementById('stat-time');
  if (el) el.textContent = `${m}:${(s < 10 ? '0' : '') + s}`;
}

// ===================== GAME RENDER =====================
function renderGame() {
  const lvl = state.currentLevel;
  const cfg = LEVEL_CONFIG[lvl];

  document.getElementById('game-header-title').textContent = `Nível ${lvl} — ${GROUP_THEMES[lvl]}`;
  document.getElementById('level-title').textContent = `Nível ${lvl}: ${GROUP_THEMES[lvl]}`;
  document.getElementById('level-desc').textContent = `Grade ${cfg.size}×${cfg.size} • ${state.words.length} palavras`;
  document.getElementById('stat-found').textContent = '0';
  document.getElementById('stat-total').textContent = state.words.length;

  renderGrid();
  renderWordList();
}

function getCellSize(gridSize) {
  const maxWidth = Math.min(window.innerWidth, 600) - 40;
  const maxHeight = window.innerHeight * 0.55;
  const byWidth = Math.floor((maxWidth - 8) / gridSize) - 2;
  const byHeight = Math.floor((maxHeight - 8) / gridSize) - 2;
  return Math.max(24, Math.min(byWidth, byHeight, 42));
}

function renderGrid() {
  const gridEl = document.getElementById('word-grid');
  const size = state.size;
  const cellSize = getCellSize(size);
  const fontSize = Math.max(10, Math.min(cellSize * 0.55, 18));

  gridEl.style.width = ((cellSize + 2) * size) + 'px';
  gridEl.innerHTML = '';

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = state.grid[r][c];
      cell.style.width = cellSize + 'px';
      cell.style.height = cellSize + 'px';
      cell.style.fontSize = fontSize + 'px';
      cell.dataset.r = r;
      cell.dataset.c = c;
      gridEl.appendChild(cell);
    }
  }

  setupGridInteraction();
  updateFoundDisplay();
}

function renderWordList() {
  const listEl = document.getElementById('word-list');
  listEl.innerHTML = '';
  state.placedWords.forEach(pw => {
    const chip = document.createElement('div');
    chip.className = 'word-chip' + (pw.found ? ' found-word' : '');
    chip.textContent = pw.word;
    chip.id = 'chip-' + pw.word;
    listEl.appendChild(chip);
  });
  updateWordCount();
}

function updateWordCount() {
  const found = state.foundWords.length;
  const total = state.words.length;
  document.getElementById('words-count').textContent = `${found}/${total} encontradas`;
  document.getElementById('stat-found').textContent = found;
}

// ===================== GRID INTERACTION =====================
function setupGridInteraction() {
  const gridEl = document.getElementById('word-grid');

  function getCell(el) {
    let t = el;
    while (t && !t.dataset.r) t = t.parentElement;
    if (!t) return null;
    return { r: parseInt(t.dataset.r), c: parseInt(t.dataset.c), el: t };
  }

  function onStart(e) {
    e.preventDefault();
    const src = e.touches ? e.touches[0].target : e.target;
    const cell = getCell(src);
    if (!cell) return;
    state.selecting = true;
    state.startCell = cell;
    state.endCell = cell;
    highlightSelection(cell, cell);
  }

  function onMove(e) {
    if (!state.selecting) return;
    e.preventDefault();
    const src = e.touches
      ? document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY)
      : e.target;
    const cell = getCell(src);
    if (!cell) return;
    state.endCell = cell;
    highlightSelection(state.startCell, cell);
  }

  function onEnd(e) {
    if (!state.selecting) return;
    e.preventDefault();
    state.selecting = false;
    checkSelection(state.startCell, state.endCell);
    clearSelectionHighlight();
  }

  gridEl.addEventListener('mousedown', onStart);
  gridEl.addEventListener('mousemove', onMove);
  gridEl.addEventListener('mouseup', onEnd);
  gridEl.addEventListener('touchstart', onStart, { passive: false });
  gridEl.addEventListener('touchmove', onMove, { passive: false });
  gridEl.addEventListener('touchend', onEnd, { passive: false });
}

function getCellsInLine(start, end) {
  const dr = end.r - start.r;
  const dc = end.c - start.c;
  const len = Math.max(Math.abs(dr), Math.abs(dc));
  if (len === 0) return [start];

  // Only valid directions
  const absDr = Math.abs(dr);
  const absDc = Math.abs(dc);
  if (absDr !== 0 && absDc !== 0 && absDr !== absDc) {
    // Not a valid diagonal — snap to closest axis
    if (absDr > absDc) {
      end = { r: end.r, c: start.c, el: null };
    } else {
      end = { r: start.r, c: end.c, el: null };
    }
    return getCellsInLine(start, end);
  }

  const stepR = dr === 0 ? 0 : dr / Math.abs(dr);
  const stepC = dc === 0 ? 0 : dc / Math.abs(dc);
  const cells = [];
  for (let i = 0; i <= len; i++) {
    cells.push({ r: start.r + stepR * i, c: start.c + stepC * i });
  }
  return cells;
}

function highlightSelection(start, end) {
  clearSelectionHighlight();
  const cells = getCellsInLine(start, end);
  cells.forEach(({r, c}) => {
    const el = getCellEl(r, c);
    if (el) el.classList.add('selecting');
  });
  state.selectedCells = cells;
}

function clearSelectionHighlight() {
  Array.prototype.forEach.call(document.querySelectorAll('.cell.selecting'), function(el) { el.classList.remove('selecting'); });
  state.selectedCells = [];
}

function getCellEl(r, c) {
  return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

function checkSelection(start, end) {
  if (!start || !end) return;
  const cells = getCellsInLine(start, end);
  const word = cells.map(({r, c}) => state.grid[r][c]).join('');

  const match = state.placedWords.find(pw => !pw.found && (
    pw.word === word ||
    pw.word === word.split('').reverse().join('') // allow reverse selection
  ));

  if (match) {
    match.found = true;
    state.foundWords.push(match.word);

    // Highlight found cells
    match.cells.forEach(([r, c]) => {
      const el = getCellEl(r, c);
      if (el) el.classList.add('found');
    });

    const chip = document.getElementById('chip-' + match.word);
    if (chip) chip.className = 'word-chip found-word';

    updateWordCount();
    playSFX('found');
    showToast(IC.check + ' ' + match.word + ' encontrada!');

    if (state.foundWords.length === state.placedWords.length) {
      setTimeout(showCompletion, 700);
    }
  } else {
    // Check if it's at least 2 cells
    if (cells.length >= 2) {
      playSFX('wrong');
    }
  }
}

function updateFoundDisplay() {
  state.placedWords.forEach(pw => {
    if (pw.found) {
      pw.cells.forEach(([r, c]) => {
        const el = getCellEl(r, c);
        if (el) el.classList.add('found');
      });
    }
  });
}

// ===================== COMPLETION =====================
function showCompletion() {
  clearInterval(state.timerInterval);
  const secs = state.elapsedSeconds;
  const m = Math.floor(secs / 60);
  const s = secs % 60;

  // Calculate stars
  const cfg = LEVEL_CONFIG[state.currentLevel];
  const maxTime = cfg.size * cfg.words * 8;
  const stars = secs < maxTime * 0.4 ? 3 : secs < maxTime * 0.7 ? 2 : 1;

  // Save progress
  state.progress[state.currentLevel] = {
    completed: true,
    stars,
    time: secs,
  };
  localStorage.setItem('cacapalavras_progress', JSON.stringify(state.progress));

  // Show overlay
  const nextLvl = state.currentLevel + 1;
  const hasNext = nextLvl <= 40;

  document.getElementById('cel-emoji').innerHTML = IC.trophy;
  document.getElementById('cel-title').textContent = 'Parabéns!';
  document.getElementById('cel-stars').innerHTML = IC.star.repeat(stars);
  document.getElementById('cel-sub').textContent =
    `Você completou o Nível ${state.currentLevel} em ${m}:${(s < 10 ? '0' : '') + s}!\n${stars === 3 ? 'Perfeito!' : stars === 2 ? 'Muito bem!' : 'Continue assim!'}`;

  const nextBtn = document.getElementById('next-level-btn');
  if (hasNext) {
    nextBtn.style.display = '';
    nextBtn.innerHTML = `Próximo (${nextLvl}) ` + IC.arrowRight;
  } else {
    nextBtn.style.display = 'none';
  }

  document.getElementById('celebration').classList.add('show');
  playSFX('complete');
  launchConfetti();
}

function goToNextLevel() {
  document.getElementById('celebration').classList.remove('show');
  const next = state.currentLevel + 1;
  if (next <= 40) {
    startLevel(next);
  } else {
    goToSelect();
  }
}

function goToSelect() {
  document.getElementById('celebration').classList.remove('show');
  if (state.timerInterval) clearInterval(state.timerInterval);
  renderLevelSelect();
  showScreen('screen-select');
  updateMusicButtons();
}

// ===================== CONFETTI =====================
function launchConfetti() {
  const colors = ['#e94560','#f5a623','#2ecc71','#3498db','#9b59b6','#1abc9c'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random() * 100}vw;
        top: -20px;
        background: ${colors[Math.floor(Math.random()*colors.length)]};
        width: ${6 + Math.random()*8}px;
        height: ${6 + Math.random()*8}px;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration: ${2 + Math.random()*3}s;
        animation-delay: 0s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }, i * 40);
  }
}

// ===================== INIT =====================
function init() {
  updateMusicButtons();
  renderLevelSelect();

  if (state.musicOn) {
    // Start music on first interaction
    const startOnInteract = () => {
      startMusic();
      document.removeEventListener('touchstart', startOnInteract);
      document.removeEventListener('mousedown', startOnInteract);
    };
    document.addEventListener('touchstart', startOnInteract, { once: true });
    document.addEventListener('mousedown', startOnInteract, { once: true });
  }
}

init();
</script>
